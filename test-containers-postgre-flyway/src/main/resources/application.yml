spring:
  application:
    name: test-containers-postgre-flyway

concept:
  datasource:
    url: ${CONCEPT_DB_URL:jdbc:postgresql://localhost:5432/concept}
    username: ${CONCEPT_DB_USER:admin}
    password: ${CONCEPT_DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      pool-name: concept-hikari
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
      hibernate.default_schema: ${CONCEPT_DB_SCHEMA:concept}
      # Prevents Hibernate from querying JDBC metadata at startup (no DB connection needed at startup)
      hibernate.temp.use_jdbc_metadata_defaults: false



